body:
  text: 駁五經異義五經總義類提要臣等謹案駁五經異義一卷補遺一卷漢鄭玄所駁許慎五經異義之文也考後漢書許慎傳稱慎以五經傳説臧否不同於是撰為五經異義稱於世鄭玄傳載玄所著百餘萬言亦有駁許慎五經異義之名隋書經籍志有五經異義十卷後漢太尉祭酒許慎撰而不及鄭玄之駁議舊唐書經籍志五經異義十卷許慎撰鄭玄駁新唐書藝文志並同蓋鄭氏所駁之文即附見於許氏原本之內而非别為一書故史志所載亦互有詳略至宋史藝文志遂無此書之名則自唐以來失傳久矣學者所見異義僅出於初學記通典太平御覽諸書所引而鄭氏駁議則自三禮正義而外所存亦復寥寥此本抄帙流傳蓋亦後人從諸書採掇而成已非隋唐志十卷之舊或有題作宋王應麟編者亦無確據當必以應麟注意漢學如周易鄭注之類皆所補輯遂以此書亦歸之應麟耳其間有單詞隻句駁存而義闕者原本錯雜互引頗失條理今詳加釐正以義駁兩全者彚列於前而僅存駁義者則附録以備參考又近時朱彛尊經義考內亦嘗旁引鄭駁數條而長洲惠氏所輯則搜羅益為廣備往往多此本所未及今參互考證除其復重以二家所採定著五十七條别為補遺一卷附之於後其間有異義而鄭無駁者則鄭與許同者也西漢學者大都專治一經彼此不能相通師説所承每多乖異逮東漢而兼者漸衆故許慎至有五經無雙之目自唐儒作五經正義專主鄭説而許義漸微然其詳析同異指趣所在多可考見此本雖條目無多而什一僅存固言漢學者所宜詳究焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
