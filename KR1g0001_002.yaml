front:
  text: 駁五經異義補遺
  hash: sha256:338684ea6fca7156f5046619557dbc3328377c690ffd075a3104621edb7b6e06
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1g0001_WYG_002-1a, image: WYG0182/WYG0182-0314a.png}
body:
  text: 漢鄭玄撰卿大夫有主不異義或曰卿大夫有主不答曰一云謹案卿大夫非有土之君不得格享昭穆故無木主一云不得有主春秋左氏傳曰衛孔悝反祏於西圃祏石主也言大夫以石為主謹案大夫以石為主禮無明文大夫士無昭穆不得有主今山陽民俗祠有石主駁云少牢饋食大夫祭禮也束帛依神特牲饋食士祭禮也結茅為菆孔悝祏主者祭其所出之君為之主耳又云主者神象也孝子既葬心無所依以虞而立主以事之唯天子諸侯有主卿大夫無主尊卑之差也卿大夫無主者依神以几筵故少牢之祭但有尸無主三王之代小祥以前主用桑者始死尚質故不相變既練易之遂藏於廟以為祭主甲午祠兵異義公羊説甲午祠兵師出曰祠兵入曰振旅祠者祠五兵矛戟劍楯弓矢按周禮夏官疏車之五兵戈殳戟酋矛夷矛步卒之五兵則無夷矛而有弓矢及祠蚩尤之造兵者左氏説甲午治兵為授兵於廟謹案三朝記曰蚩尤庶人之強者何兵之能造駁云祠兵者公羊字之誤以治為祠因而作説如此周司馬職曰仲夏教茇舍仲秋教治兵其下皆云如戰之陳仲冬教大閲修戰法虞人萊所田之野乃為之如是治兵之屬皆習戰非授兵於廟又無祠五兵之禮按原本亦載此條其文甚略今並録於後兵異義公羊説以為甲午祠兵左氏説甲午治駁曰公羊氏誤也竈異義大戴記禮器云竈者老婦之祭許君按月令孟夏之月其祀竈五祀之神王者所祭非老婦也駁曰王為羣姓立七祀一曰司命主督察王命也二曰中霤主宫室居處三曰門四曰户主出入五曰國門主道路也六曰大厲主殺也七曰竈主飲食也竈神祝融是老婦御覽五百二十九諸侯踰年即位乃奔喪異義大鴻臚眭音雖生説諸侯踰年即位乃奔喪春秋之義未踰年君死不成以人君禮言王者未加其禮故諸侯亦不得供其禮於王者相報也謹案禮不得以私廢公卑廢尊如禮得奔喪今以私喪廢奔王者之喪非也又人臣之義不得計校天子未加禮於我亦執之不加服禮也眭生之説非也鄭氏按孝經資於事父以事君言能為人子乃能為人臣也服同嗣子不為天子服此則嫌欲速不一於父也喪服制曰門內之治恩掩義門外之治義斷恩此言在父則為父在君則為君也春秋莊三十二年子般卒時父未葬也子者繫於父之稱也言卒不言薨未成君也未成君猶繫於父則當從門內之治恩掩義耳禮者在於所處此何以私廢公何以卑廢尊未踰年之君立廟不異義春秋公羊説云未踰年君有子則書葬立廟無子則不書葬恩無所録也左氏説云臣之奉君悉心盡恩不得録君父有子則為立廟無子則廢也或議曰闕文案禮云臣不殤君子不殤父君無子而不為立廟是背義棄禮罪之大者也駁云未踰年君者魯子般子惡是也皆不稱公書卒弗諡不成於君也廟者當序於昭穆不成於君則何廟之立凡無廟者為壇祭之近漢諸幼小之帝尚皆不立廟而祭於陵云罪之重者此何故不罪殤者十九向下未踰年之君未必非冠引殤欲以何明也蔡雍云見孝殤孝沖孝質皇帝以幼弱在位未踰年不列於廟太尉司徒分視三陵皆宗廟典制也諸侯未踰年出朝會與不出會何稱異義公羊説云諸侯未踰年不出境在國中稱子以王事出亦稱子非王事而出會同安父位不稱子鄭伯伐許未踰年以本爵譏不子也左氏説諸侯未踰年在國內稱子以王事出則稱爵詘於王事不敢伸其私恩鄭伯伐許是春秋不得以家事辭王事諸侯蕃衛之臣雖未踰年以王事稱爵是也駁云昔武王卒父業既除喪出至孟津之上猶稱太子者是為孝也今未除喪而出稱爵是與武王義反矣春秋僖九年春三月丁丑宋公禦説卒夏公會宰周公齊侯宋子衛侯鄭伯許男曹伯於葵丘宋子即踰年君也出與天子大夫會是非王事而稱子耶諸侯有妾母喪得出朝會不異義春秋公羊説妾子為諸侯不敢以妾母之喪廢事天子大國出朝會禮也魯宣公如齊有妾母之喪經書善之左氏説云妾子為君當尊其母有三年之喪而出朝會非禮也按一本有故譏魯宣公五字案禮妾母無服貴妾子不立而他妾子立者也不敢以卑廢事尊者禮也即妾子為君義如左氏駁云喪服緦麻庶子為後為其母此義自天子下至庶人同不三年魯宣公所以得尊其妾母敬嬴為夫人者以夫人薑氏已歸齊不反故也因是言妾子立母卒得為之三年於禮為通乎其服之間其出朝會無王事與鄭伯伐許何異罍制本作第六壘制異義韓詩説金罍大夫器也天子以玉諸侯大夫以金士以梓古毛詩説金罍酒器也諸臣之所酢人君以黃金飾尊大一碩一作石金飾龜一作亡目蓋刻為一作取象雲雷之象謹案韓詩説天子以玉經無明文謂之罍者取象雲雷博施如人君下及諸臣同如是經文惟有詩云我姑酌彼金罍古毛詩説云人君以黃金則其餘諸臣直有金無黃金飾也按鄭無駁同許説騶虞異義今詩韓魯説騶虞天子掌鳥獸官古毛詩説騶虞義獸白虎黑文食自死之肉不食生物人君有至信之德則應之周南終麟趾召南終騶虞俱稱嗟嘆之皆獸名謹案古山海經書騶虞獸説與毛詩同是其聖獸也按鄭無駁同許氏卿得世異義今春秋公羊榖梁説云卿大夫世位則權并一姓妨塞賢路專政犯君故經譏周尹氏齊崔氏是也而古春秋左氏説卿大夫皆得世祿不得世位父為大夫死子得食其故采地而一作如按二字通用有賢才則復升父故位故傳曰官有世功則有官族謹案易爻位三為三公二為卿大夫曰食舊德謂食父故祿也尚書云古我先王暨乃祖乃父胥及逸勤豫不敢動用非罰世選爾勞豫不掩爾善論語曰興滅國繼絶世國謂諸侯世為卿大夫詩曰惟周之士不顯亦世孟子曰文王之治岐也仕者世祿知周制世祿也從左氏義按鄭駁公羊説見前卷同許氏説宗而不毁異義詩魯説丞相匡衡以為殷中宗周成宣王皆以時毁古文尚書説經稱中宗明其廟宗而不毁謹案春秋公羊御史大夫禹貢疑當作貢禹説王者宗有德廟不毁宗而復毁非尊德之義鄭從而不駁祭天有尸異義公羊説祭天無尸左氏説晉祀夏郊以董伯為尸虞夏傳云舜入唐郊以丹朱為尸是祭有尸也謹案魯郊禮曰祀延帝尸從左氏説按鄭無駁從許説復讎異義公羊説復百世之讎古周禮説復讎可盡五世之內五世之外施之於己則無義施之於彼則無罪所復者謂殺者之身乃在被殺者子孫可盡五世得復之謹案魯桓公為齊襄公所殺其子莊公與齊桓公會春秋不譏又定公是魯桓公九世孫孔子相定公與齊會於夾谷是不復百世之讎也從周禮説鄭不駁與許同二名異義公羊説譏二名謂二字作名若魏曼多也左氏説二名者楚公子棄疾弒其君即位之後改為熊居是為二名謹案文武賢臣有散宜生蘇忿生則公羊之説非也從左氏義曲禮正義許按鄭無駁從義諸侯無去國之義異義公羊説國滅君死正也故禮運云君死社稷無去國之義左傳説昔太王居豳狄人攻之乃踰梁山邑於岐山故知有去國之義也謹案易曰係遁有疾厲畜臣妾吉知諸侯無去國之義也鄭無駁明從許君用公羊義也中國里數異義今尚書歐陽夏侯説中國方五千里古尚書説五服方五千里相距萬里謹案以今漢地考之自黑水至東海衡山之陽至於朔方經略萬里從古尚書説鄭氏無駁與許同天子聘諸侯異義公羊説天子無下聘義周禮説間問以諭諸侯之志謹案禮臣病君親問之天子有下聘之義從周禮説鄭無駁與許同羽舞異義公羊説樂萬舞以鴻羽取其徑輕一舉千里詩毛説以翟羽韓詩説以夷狄大鳥羽謹案詩云右手秉翟爾雅説翟鳥名雉屬也知翟羽舞也按鄭無駁與許同朝宿邑異義公羊説諸侯朝天子天子之郊皆有朝宿之邑從泰山之下皆有湯沐之邑左氏説諸侯有大功盛德於王室京師有朝宿之邑泰山有湯沐之邑所以供祭祀魯周公之後鄭宣王母弟此皆有湯沐邑其餘則否謹案若今諸侯京師之地皆有朝宿邑周有千八百諸侯盡京師之地不足以容不合事理之宜許不從公羊説鄭無駁從許氏説諸侯自相奔喪禮異義公羊説遣大夫弔君會其葬左氏説諸侯之喪士弔大夫會葬文襄之霸令大夫弔卿共葬事謹案周禮無諸侯會葬義知不相會葬從左氏義鄭氏無駁類祭異義今尚書夏侯歐陽説以類祭天名曰以事類祭之奈何天位在南方就南郊祭之是也古尚書説非時祭之謂之類言以事類祭告也肆類於上帝時舜告攝非常祭謹案周禮郊天無言類者知類非常祭從古尚書説鄭無駁與許同人君年幾而娶異義今大戴禮説男三十女二十有婚嫁合為五十應大衍之數自天子達於庶人同也一云男子三十而娶女子二十而嫁天子以下及庶人同禮春秋左傳説人君十五生子禮也二十而嫁三十而娶庶人禮也禮大夫為婦之長殤長殤十九至十六知夫年十四十五見士婚禮也謹案舜生三十不娶謂之鰥禮文王世子曰文王十五而生武王武王尚有兄伯邑考故知人君早婚娶不可以年三十所以重繼嗣也鄭無駁雨不克葬異義公羊説雨不克葬謂天子諸侯也卿大夫臣賤不能以雨止榖梁説葬既有日不為雨止左氏説士葬先逺日辟不壞言不汲汲葬其親不可行事廢禮不行庶人不為雨止謹案論語云死葬之以禮以雨而葬是不行禮榖梁説非也從公羊左氏之説鄭氏無駁與許同未踰年之君繫父不異義公羊説云未踰年之君皆繫於父晉里克殺其君之子奚齊是也左氏説未踰年之君未葬繫於父殺奚齊於次父未葬雖未踰年稱子成為君不繫於父齊公子商人殺其君舍父已葬案禮制君喪未葬已葬儀各有差嗣君號稱亦宜有差左氏説是也按鄭無駁同許義諸侯娶同姓異義今春秋公羊説魯昭公娶於吳諱同姓也謂之吳孟子春秋左氏説孟子非小君也不成其喪不當譏又案易曰同人於宗吝言同姓相娶吝道也即犯誅絶之罪言五屬之內禽獸行乃當絶按鄭無駁同許義諸侯祖天子異義禮戴説郊特牲云諸侯不敢祖天子大夫不敢祖諸侯匡衡説支庶不敢薦其禮下士諸侯不得專祖於王古春秋左氏説天子之子以上德為諸侯者得祀其所自出謹案周公以上德封於魯得郊天兼用四代之禮樂知亦得祖天子諸侯有德祖天子者知大夫亦得祖諸侯鄭氏無駁與許同虞祔異義公羊説虞而作主春秋左氏説既葬反虞天子九虞虞者以柔日九虞十六日也諸侯七虞十二日也大夫五虞八日也士三虞四日也既虞然後祔死者於先死者祔而作主謂桑主也期年然後作栗主謹案左氏説與禮同按鄭無駁同許義盟詛異義禮約盟不今春秋公羊説古者不盟結言而退故榖梁傳云誥誓不及五帝盟詛不及三王交質子不及五伯且盟非禮故春秋左氏云周禮有司盟之官殺牲歃血所以盟事神明又云凡國有疑盟詛其不信者是知於禮得盟謹案從左氏説以太平之時有盟詛之禮鄭氏不駁從許義主所用木異義論語哀公問社當作主於宰我宰我答夏后氏以松夏人都河東宜松也殷人以柏殷人都亳宜柏也周人以栗周人都灃鎬宜栗也按此條並見太平御覽五百三十一今春秋公羊説祭有主者孝子之主繫心夏后氏以松殷人以柏周人以栗周禮説虞主用桑練主以栗無夏后以松為主之事謹案從周禮説論語所云謂社主也祭法正義義鄭無駁從許鄭聲淫異義今論説當云今論語説鄭國之為俗有溱洧之水男女聚會謳歌相感故云鄭聲淫左傳説煩手淫聲謂之鄭聲者言煩手躑躅之聲使淫過矣謹案今鄭詩二十篇説婦人者十九故鄭聲淫也按鄭無駁祔主異義左氏説凡君薨祔而作主特祀主於寢畢三時之祭期年然後蒸嘗禘於廟謹案左氏説與禮同鄭無駁周禮鬯人疏祭禮異義古春秋左氏説古者先王日祭於祖考月荐於曾髙將享及二祧嵗禱於壇禘及郊宗石室謹案叔孫通宗廟有日一作月祭之禮知古而然也三嵗一祫此周禮也五嵗一禘一作祀疑先王之禮也御覽五百二十八文初學記十三藝類聚三十八始於有虞氏故云先王之禮鸞和異義禮戴説鸞在衡和在軾毛詩説在軾曰和在鑣曰鸞謹案經無明文鄭無駁駟鐡正義五玉贄異義謹案周禮説五玉贄自孤卿以下執禽尊卑有差也禮不下庶人工商之朝儀五經無説庶人工商有贄御覽三百三十九三公異義今尚書夏侯歐陽説天子三公一曰司徒二曰司馬三曰司空九卿二十七大夫八十一元士凡百二十古周禮説天子立三公曰太師太傅太保無官屬與王同職故曰坐而論道謂之三公又立三少以為之副曰少師少傅少保是為三孤冢宰司徒宗伯司馬司冦司空是為六卿之屬大夫士庶人在官者凡萬二千名案周公為傅召公為保太公為師周公太公無為司徒司空文知師保傅三公官名也五帝三王不同物此周之制也北堂書鈔五十附録韓詩云天子諸侯以牛豕大夫以犬庶人以雞毛詩説君以豕臣以犬民以雞曲禮正義春秋公羊説禮郊及日皆不卜常以正月上下也魯於天子並事變禮今成王命魯使卜從郊不從日以下天子也魯以上辛郊不敢與天子同也御覽五百二十七今春秋公羊説宗廟筮而不卜傳曰禘祫不卜御覽五百二十八左氏説脤社祭之肉盛之以蜃宗廟之肉名曰膰周禮大宗伯疏古尚書説云武王崩時成王年十三後一年管蔡作亂周公東辟之王與大夫盡辨以啓金縢之書時成王年十四言辨明知己冠矣公羊疏今禮戴説云男子陽也成於隂故二十而冠公羊説云鼷鼠初食牛角咎在有司公羊疏公羊説云質家立世子弟文家立世子子而春秋從質故得立其弟公羊疏公羊説襄公三十年叔弓如宋葬宋共姬譏公不自行公羊疏春秋公羊榖梁説王使榮叔賜魯桓公命追錫死者非禮也死者功可追而錫如有罪又可追而刑耶春秋左氏譏其錫篡弒之君無譏錫死者文也通典七十二古周禮説大宗伯曰凡禮大神享大鬼大鬼謂先王也祭大祇率執事而卜御覽五百二十五祈父詩曰有母之尸饔謂陳饔以祭志養不及親夏至天子親祀方澤侍中騎都尉賈逵説曰魯無圜丘方澤之祭者周兼用六代禮樂魯用四代其祭天之禮亦宜損於周故曰二至之日不祭天地二至夏至冬至謂不當祭也御覽五百二十五夏侯歐陽説云墨罰疑赦其罰百率古以六兩為率古尚書説百鍰鍰者率也一率十一銖二十五分銖之十三也百鍰為三斤鄭氏以為古之率多作鍰周禮職金疏春秋左傳無駭卒羽父請諡與族公問族於衆仲對曰天子建德因生以賜姓胙之土而命之氏諸侯以字為氏因以為族官有世功則有官族氏亦如之公命以字為展氏以此言之天子賜姓命氏諸侯命族族者氏之别名也姓者所以統繫百世使不别也氏者所以别子孫之所出故世本之篇言姓則在上言氏則在下也駁異義史記注左氏説山林之地九夫為度九度而當一井藪澤之地九夫為鳩八鳩而當一井京陵之地九夫為辨七辨而當一井淳鹵之地九夫為表六表而當一井疆潦之地九夫為藪五藪而當一井偃豬之地九夫為規四規而當一井原防之地九夫為町三町而當一井隰臯之地九夫為牧二牧而當一井衍沃之地九夫為井賦法積四十五除山川坑岸三十六井定出賦者九井則千里之畿地方百萬井除山川坑岸三十六萬井定出賦者六十四萬井長轂萬乘王制正義鄭按此詮井地義亦與後周官疏不同鄭氏以為左氏宣十八年秋七月云邾人戕鄫子於鄫傳曰凡自內虐其君曰弒自外曰戕即邾人戕鄫子是也自內弒其君曰弒者晉人弒其君州蒲是也雖他國君不加虐亦曰殺若加虐殺之乃謂之戕之取殘賊之意也若自上殺下及兩下自相殺之等皆曰殺大司馬疏月髙則其食虧於上月上則其食虧於下左傳桓三年正義王者一嵗七祭天地仲春后妃郊禖亦祭天也御覽五百二十九五變而致土祇祇者五土之總神謂社是以變原隰言土祇鄭駁疏大司樂主狀正方穿中央達四方天子長尺二寸諸侯長一尺曲禮正義天子之城髙九仞公侯七仞伯五仞子男三仞初學記二十四駁五經異義補遺
